[dev]
  # Carpeta que Netlify sirve como sitio estático
  publish = "public"
  # Puerto local para desarrollo
  port = 8888
  # Carpeta donde están las Netlify Functions
  functions = "netlify/functions"

[build]
  # Carpeta que se publica en producción
  publish = "public"
  # Carpeta de funciones en producción
  functions = "netlify/functions"

[functions]
  # Directorio de funciones serverless
  directory = "netlify/functions"

# La raíz del sitio redirige al Asistente (la "home" de la app).
# El Dashboard sigue existiendo en /index.html, pero fuera del camino.
[[redirects]]
  from = "/"
  to = "/asistente.html"
  status = 302
