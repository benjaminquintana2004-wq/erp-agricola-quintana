<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotes — ERP Agrícola Quintana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/lotes.css">
</head>
<body>

    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando lotes...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">

            <!-- Filtros de estado -->
            <div class="lotes-filtros">
                <button class="filtro-btn activo" data-filtro="todos" onclick="filtrarPorEstado('todos')">
                    Todos <span class="filtro-cont" id="cont-todos">0</span>
                </button>
                <button class="filtro-btn" data-filtro="libre" onclick="filtrarPorEstado('libre')">
                    Libre <span class="filtro-cont" id="cont-libre">0</span>
                </button>
                <button class="filtro-btn" data-filtro="en_preparacion" onclick="filtrarPorEstado('en_preparacion')">
                    En preparación <span class="filtro-cont" id="cont-en_preparacion">0</span>
                </button>
                <button class="filtro-btn" data-filtro="sembrado" onclick="filtrarPorEstado('sembrado')">
                    Sembrado <span class="filtro-cont" id="cont-sembrado">0</span>
                </button>
                <button class="filtro-btn" data-filtro="cosechado" onclick="filtrarPorEstado('cosechado')">
                    Cosechado <span class="filtro-cont" id="cont-cosechado">0</span>
                </button>
                <button class="filtro-btn" data-filtro="barbecho" onclick="filtrarPorEstado('barbecho')">
                    Barbecho <span class="filtro-cont" id="cont-barbecho">0</span>
                </button>
            </div>

            <!-- Toolbar -->
            <div class="tabla-toolbar">
                <div class="tabla-toolbar-izq">
                    <div class="tabla-busqueda">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="input-busqueda" placeholder="Buscar por nombre, campo o arrendador..." oninput="buscarLotes(this.value)">
                    </div>
                    <span id="tabla-contador" class="tabla-contador">0 lotes</span>
                </div>
                <div>
                    <button class="btn-primario" onclick="abrirModalNuevoLote()" id="btn-nuevo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nuevo Lote
                    </button>
                </div>
            </div>

            <!-- Tabla -->
            <div class="tabla-contenedor" style="overflow-x: auto;">
                <table class="tabla" style="min-width: 900px;">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Ubicación</th>
                            <th>Hectáreas</th>
                            <th>Arrendador</th>
                            <th>Estado</th>
                            <th>Campaña actual</th>
                            <th style="width: 100px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-lotes-body">
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/lotes.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Lotes',
                'Gestión de lotes de campo y cultivos por campaña'
            );
            if (!usuario) return;

            if (usuario.rol === 'empleado') {
                const btn = document.getElementById('btn-nuevo');
                if (btn) btn.style.display = 'none';
            }

            await cargarLotes();
        }
        iniciar();
    </script>

</body>
</html>
