<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de arrendador — ERP Agrícola Quintana</title>

    <!-- Fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/ficha-arrendador.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando ficha del arrendador...</p>
    </div>

    <!-- Contenido principal (oculto hasta que cargue) -->
    <div id="contenido-principal" class="contenido-principal" style="display: none;">

        <!-- Header inyectado por crearLayout() -->

        <div class="pagina-contenido">

            <!-- Barra superior: volver + acciones -->
            <div class="ficha-barra-superior no-imprimir">
                <a class="btn-secundario" href="/arrendadores.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Volver
                </a>
                <div style="flex: 1;"></div>
                <button class="btn-secundario" onclick="window.print()" title="Imprimir o guardar como PDF">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Imprimir / PDF
                </button>
                <button class="btn-primario" id="btn-editar-arr" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Editar
                </button>
            </div>

            <!-- Contenedor principal de la ficha -->
            <div id="ficha-contenido">
                <!-- Se llena dinámicamente desde arrendador.js -->
            </div>

        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts en orden -->
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/arrendadores.js"></script>
    <script src="/js/arrendador.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Ficha del arrendador',
                'Vista integral: contratos, campañas, movimientos',
                ''
            );
            if (!usuario) return;

            // Leer id de la URL
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('ficha-contenido').innerHTML =
                    '<div class="vacio"><p>Falta el parámetro <code>id</code> en la URL.</p></div>';
                return;
            }

            await cargarFichaArrendador(id, usuario);
        }

        iniciar();
    </script>

</body>
</html>
