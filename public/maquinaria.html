<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquinaria — ERP Agrícola Quintana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/maquinaria.css">
</head>
<body>

    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando maquinaria...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">

            <div id="alertas-service"></div>

            <div class="tabla-toolbar">
                <div class="tabla-toolbar-izq">
                    <div class="tabla-busqueda">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="input-busqueda" placeholder="Buscar por nombre, marca o tipo..." oninput="buscarMaquinaria(this.value)">
                    </div>
                    <span id="tabla-contador" class="tabla-contador">0 máquinas</span>
                </div>
                <div>
                    <button class="btn-primario" onclick="abrirModalNuevaMaquina()" id="btn-nuevo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nueva Máquina
                    </button>
                </div>
            </div>

            <div class="tabla-contenedor" style="overflow-x:auto;">
                <table class="tabla" style="min-width:900px;">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Marca / Modelo</th>
                            <th>Año</th>
                            <th>Horas</th>
                            <th>Costo/hora</th>
                            <th>Próx. service</th>
                            <th style="width:130px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-maquinaria-body"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/maquinaria.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Maquinaria',
                'Registro de máquinas propias, horas de uso y mantenimientos'
            );
            if (!usuario) return;

            if (usuario.rol === 'empleado') {
                document.getElementById('btn-nuevo').style.display = 'none';
            }

            await cargarMaquinaria();
        }
        iniciar();
    </script>

</body>
</html>
