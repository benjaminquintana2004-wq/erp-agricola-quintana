<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ERP Agrícola Quintana</title>

    <!-- Fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando sistema...</p>
    </div>

    <!-- Contenido principal (oculto hasta que cargue) -->
    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: var(--espacio-lg); text-align: center;">
                <div style="background-color: var(--color-dorado-suave); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--color-dorado)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                    </svg>
                </div>
                <h2 style="color: var(--color-texto); font-size: var(--texto-2xl);">Dashboard en construcción</h2>
                <p style="color: var(--color-texto-secundario); max-width: 400px;">
                    El dashboard principal con estadísticas, alertas y gráficos se construye en el PASO 7.
                    <br><br>
                    Mientras tanto, usá el menú de la izquierda para navegar.
                </p>
                <a href="/arrendadores.html" class="btn-primario" style="margin-top: var(--espacio-md);">
                    Ir a Arrendadores
                </a>
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts -->
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Dashboard',
                'Panel principal del sistema'
            );
            if (!usuario) return;
        }
        iniciar();
    </script>

</body>
</html>
