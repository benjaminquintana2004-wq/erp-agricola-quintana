<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrendadores — ERP Agrícola Quintana</title>

    <!-- Fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando arrendadores...</p>
    </div>

    <!-- Contenido principal (oculto hasta que cargue) -->
    <div id="contenido-principal" class="contenido-principal" style="display: none;">

        <!-- El header se inyecta desde JS via crearLayout() -->

        <!-- Contenido de la página -->
        <div class="pagina-contenido">

            <!-- Alertas (sin contrato, etc.) -->
            <div id="alertas-arrendadores"></div>

            <!-- Toolbar: búsqueda + botón nuevo -->
            <div class="tabla-toolbar">
                <div class="tabla-toolbar-izq">
                    <div class="tabla-busqueda">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="input-busqueda" placeholder="Buscar por grupo, persona, CUIT, DNI, teléfono..." oninput="buscarArrendadores(this.value)">
                    </div>
                    <span id="tabla-contador" class="tabla-contador">0 grupos</span>
                </div>
                <div>
                    <button class="btn-primario" onclick="abrirModalNuevoArrendador()" id="btn-nuevo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nuevo Arrendador
                    </button>
                </div>
            </div>

            <!-- Tabla de arrendadores -->
            <div class="tabla-contenedor" style="overflow-x: auto;">
                <table class="tabla" style="min-width: 1050px;">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Contacto</th>
                            <th>Contratos</th>
                            <th>QQ pendientes</th>
                            <th>Última entrega</th>
                            <th>Estado</th>
                            <th style="width: 100px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-arrendadores-body">
                        <!-- Se llena dinámicamente desde arrendadores.js -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts en orden -->
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/arrendadores.js"></script>

    <script>
        // Inicializar la página
        async function iniciar() {
            const usuario = await crearLayout(
                'Arrendadores',
                'Agrupados por contratos compartidos: cada fila es un grupo (1 persona, familia o sociedad)',
                '' // Sin botones extra en el header por ahora
            );

            if (!usuario) return; // No tiene acceso, ya fue redirigido

            // Ocultar botón "Nuevo" si es empleado (solo lectura)
            if (usuario.rol === 'empleado') {
                const btnNuevo = document.getElementById('btn-nuevo');
                if (btnNuevo) btnNuevo.style.display = 'none';
            }

            // Cargar los arrendadores
            await cargarArrendadores();
        }

        iniciar();
    </script>

</body>
</html>
