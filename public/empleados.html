<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados — ERP Agrícola Quintana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/empleados.css">
</head>
<body>

    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando empleados...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">

            <!-- Resumen -->
            <div class="empleados-resumen" id="resumen-empleados"></div>

            <!-- Tabs -->
            <div class="empleados-tabs">
                <button class="empleados-tab activo" onclick="cambiarTabEmpleados('empleados')">Empleados</button>
                <button class="empleados-tab" onclick="cambiarTabEmpleados('jornadas')">Jornadas</button>
                <button class="empleados-tab" onclick="cambiarTabEmpleados('liquidacion')">Liquidación</button>
            </div>

            <!-- EMPLEADOS -->
            <div class="empleados-seccion activa" id="seccion-empleados">
                <div class="tabla-toolbar">
                    <div class="tabla-toolbar-izq">
                        <div class="tabla-busqueda">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="input-busqueda-empleados" placeholder="Buscar por nombre, DNI o rol..." oninput="buscarEmpleados(this.value)">
                        </div>
                        <span id="contador-empleados" class="tabla-contador">0 empleados</span>
                    </div>
                    <div>
                        <button class="btn-primario" onclick="abrirModalNuevoEmpleado()" id="btn-nuevo-empleado">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Nuevo Empleado
                        </button>
                    </div>
                </div>

                <div class="tabla-contenedor" style="overflow-x:auto;">
                    <table class="tabla" style="min-width:950px;">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>DNI</th>
                                <th>CUIL</th>
                                <th>Rol</th>
                                <th>Ingreso</th>
                                <th>Jornal diario</th>
                                <th>Estado</th>
                                <th style="width:100px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-empleados-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- JORNADAS -->
            <div class="empleados-seccion" id="seccion-jornadas">
                <div class="tabla-toolbar">
                    <div class="tabla-toolbar-izq">
                        <div class="tabla-busqueda">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="input-busqueda-jornadas" placeholder="Buscar por empleado, lote o tarea..." oninput="buscarJornadas(this.value)">
                        </div>
                        <span id="contador-jornadas" class="tabla-contador">0 jornadas</span>
                    </div>
                    <div>
                        <button class="btn-primario" onclick="abrirModalNuevaJornada()" id="btn-nueva-jornada">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Nueva Jornada
                        </button>
                    </div>
                </div>

                <div class="tabla-contenedor" style="overflow-x:auto;">
                    <table class="tabla" style="min-width:850px;">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Empleado</th>
                                <th>Horas</th>
                                <th>Lote</th>
                                <th>Tarea</th>
                                <th style="width:100px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-jornadas-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- LIQUIDACIÓN -->
            <div class="empleados-seccion" id="seccion-liquidacion">
                <div class="liquidacion-panel">
                    <h3>Calcular liquidación mensual</h3>
                    <div class="liquidacion-filtros">
                        <div class="campo-grupo">
                            <label class="campo-label">Empleado</label>
                            <select id="liquidacion-empleado" class="campo-select">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Mes</label>
                            <input type="month" id="liquidacion-mes" class="campo-input">
                        </div>
                        <div class="campo-grupo">
                            <button class="btn-primario" onclick="calcularLiquidacion()" style="margin-top:1.5rem;">Calcular</button>
                        </div>
                    </div>
                    <div class="liquidacion-resultado" id="liquidacion-resultado"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/empleados.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout('Empleados', 'Legajo de empleados, jornadas y liquidación');
            if (!usuario) return;
            if (usuario.rol === 'empleado') {
                document.getElementById('btn-nuevo-empleado')?.style.setProperty('display', 'none');
                document.getElementById('btn-nueva-jornada')?.style.setProperty('display', 'none');
            }
            await cargarEmpleados();
        }
        iniciar();
    </script>

</body>
</html>
