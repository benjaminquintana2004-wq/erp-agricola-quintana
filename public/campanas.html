<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campañas — ERP Agrícola Quintana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/campanas.css">
</head>
<body>

    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando campañas...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">

            <!-- Toolbar -->
            <div class="tabla-toolbar">
                <div class="tabla-toolbar-izq">
                    <span id="tabla-contador" class="tabla-contador">0 campañas</span>
                </div>
                <div>
                    <button class="btn-primario" onclick="abrirModalNuevaCampana()" id="btn-nuevo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nueva Campaña
                    </button>
                </div>
            </div>

            <!-- Grid de tarjetas -->
            <div class="campanas-grid" id="campanas-grid">
                <div class="campanas-vacio">
                    <div class="spinner"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/campanas.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Campañas',
                'Gestión de campañas agrícolas'
            );
            if (!usuario) return;

            if (usuario.rol === 'empleado') {
                const btn = document.getElementById('btn-nuevo');
                if (btn) btn.style.display = 'none';
            }

            await cargarCampanas();
        }
        iniciar();
    </script>

</body>
</html>
