<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos — ERP Agrícola Quintana</title>

    <!-- Fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/contratos.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando contratos...</p>
    </div>

    <!-- Contenido principal (oculto hasta que cargue) -->
    <div id="contenido-principal" class="contenido-principal" style="display: none;">

        <!-- Contenido de la página -->
        <div class="pagina-contenido">

            <!-- Filtros de estado -->
            <div class="contratos-filtros">
                <button class="filtro-btn activo" data-filtro="todos" onclick="filtrarPorEstado('todos')">
                    Todos
                    <span class="filtro-contador" id="cont-todos">0</span>
                </button>
                <button class="filtro-btn" data-filtro="vigente" onclick="filtrarPorEstado('vigente')">
                    Vigentes
                    <span class="filtro-contador" id="cont-vigente">0</span>
                </button>
                <button class="filtro-btn" data-filtro="por_vencer" onclick="filtrarPorEstado('por_vencer')">
                    Por vencer
                    <span class="filtro-contador" id="cont-por_vencer">0</span>
                </button>
                <button class="filtro-btn" data-filtro="vencido" onclick="filtrarPorEstado('vencido')">
                    Vencidos
                    <span class="filtro-contador" id="cont-vencido">0</span>
                </button>
            </div>

            <!-- Alertas de vencimiento (se llenan dinámicamente) -->
            <div id="alertas-contratos"></div>

            <!-- Toolbar: búsqueda + botón nuevo -->
            <div class="tabla-toolbar">
                <div class="tabla-toolbar-izq">
                    <div class="tabla-busqueda">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="input-busqueda" placeholder="Buscar por arrendador, campo o RENSPA..." oninput="buscarContratos(this.value)">
                    </div>
                    <span id="tabla-contador" class="tabla-contador">0 contratos</span>
                </div>
                <div>
                    <button class="btn-primario" onclick="abrirModalNuevoContrato()" id="btn-nuevo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nuevo Contrato
                    </button>
                </div>
            </div>

            <!-- Tabla de contratos -->
            <div class="tabla-contenedor" style="overflow-x: auto;">
                <table class="tabla" style="min-width: 900px;">
                    <thead>
                        <tr>
                            <th>Arrendador</th>
                            <th>Ubicación</th>
                            <th>Hectáreas</th>
                            <th>QQ/año</th>
                            <th>Vigencia</th>
                            <th>Estado</th>
                            <th>RENSPA</th>
                            <th style="width: 120px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-contratos-body">
                        <!-- Se llena dinámicamente desde contratos.js -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts en orden -->
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/contratos.js"></script>

    <script>
        // Inicializar la página
        async function iniciar() {
            const usuario = await crearLayout(
                'Contratos',
                'Contratos de arrendamiento, vencimientos y RENSPA',
                ''
            );

            if (!usuario) return;

            // Ocultar botón "Nuevo" si es empleado (solo lectura)
            if (usuario.rol === 'empleado') {
                const btnNuevo = document.getElementById('btn-nuevo');
                if (btnNuevo) btnNuevo.style.display = 'none';
            }

            // Cargar los contratos
            await cargarContratos();
        }

        iniciar();
    </script>

</body>
</html>
