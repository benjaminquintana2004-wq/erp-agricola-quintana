<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labores — ERP Agrícola Quintana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/labores.css">
</head>
<body>

    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando labores...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">

            <!-- Resumen de costos -->
            <div class="labores-resumen" id="labores-resumen"></div>

            <!-- Filtros por tipo -->
            <div class="labores-filtros">
                <button class="filtro-btn activo" data-filtro="todos" onclick="filtrarPorTipo('todos')">
                    Todas <span class="filtro-cont" id="cont-todos">0</span>
                </button>
                <button class="filtro-btn" data-filtro="siembra" onclick="filtrarPorTipo('siembra')">
                    Siembra <span class="filtro-cont" id="cont-siembra">0</span>
                </button>
                <button class="filtro-btn" data-filtro="fumigacion" onclick="filtrarPorTipo('fumigacion')">
                    Fumigación <span class="filtro-cont" id="cont-fumigacion">0</span>
                </button>
                <button class="filtro-btn" data-filtro="fertilizacion" onclick="filtrarPorTipo('fertilizacion')">
                    Fertilización <span class="filtro-cont" id="cont-fertilizacion">0</span>
                </button>
                <button class="filtro-btn" data-filtro="cosecha" onclick="filtrarPorTipo('cosecha')">
                    Cosecha <span class="filtro-cont" id="cont-cosecha">0</span>
                </button>
                <button class="filtro-btn" data-filtro="herbicida" onclick="filtrarPorTipo('herbicida')">
                    Herbicida <span class="filtro-cont" id="cont-herbicida">0</span>
                </button>
                <button class="filtro-btn" data-filtro="otro" onclick="filtrarPorTipo('otro')">
                    Otro <span class="filtro-cont" id="cont-otro">0</span>
                </button>
            </div>

            <!-- Toolbar -->
            <div class="tabla-toolbar">
                <div class="tabla-toolbar-izq">
                    <div class="tabla-busqueda">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="input-busqueda" placeholder="Buscar por lote, producto o tipo..." oninput="buscarLabores(this.value)">
                    </div>
                    <span id="tabla-contador" class="tabla-contador">0 labores</span>
                </div>
                <div>
                    <button class="btn-primario" onclick="abrirModalNuevaLabor()" id="btn-nuevo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nueva Labor
                    </button>
                </div>
            </div>

            <!-- Tabla -->
            <div class="tabla-contenedor" style="overflow-x: auto;">
                <table class="tabla" style="min-width: 900px;">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Lote</th>
                            <th>Tipo</th>
                            <th>Producto / Detalle</th>
                            <th>Dosis</th>
                            <th>Costo</th>
                            <th style="width: 100px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-labores-body">
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/labores.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Labores',
                'Cuaderno de campo — Registro de labores por lote y campaña'
            );
            if (!usuario) return;

            if (usuario.rol === 'empleado') {
                const btn = document.getElementById('btn-nuevo');
                if (btn) btn.style.display = 'none';
            }

            await cargarLabores();
        }
        iniciar();
    </script>

</body>
</html>
