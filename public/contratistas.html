<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratistas — ERP Agrícola Quintana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/contratistas.css">
</head>
<body>

    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando contratistas...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">
        <div class="pagina-contenido">

            <!-- Resumen -->
            <div class="contratistas-resumen" id="resumen-contratistas"></div>

            <!-- Tabs -->
            <div class="contratistas-tabs">
                <button class="contratistas-tab activo" onclick="cambiarTabContratistas('contratistas')">Contratistas</button>
                <button class="contratistas-tab" onclick="cambiarTabContratistas('trabajos')">Trabajos</button>
                <button class="contratistas-tab" onclick="cambiarTabContratistas('cheques')">Cheques</button>
            </div>

            <!-- CONTRATISTAS -->
            <div class="contratistas-seccion activa" id="seccion-contratistas">
                <div class="tabla-toolbar">
                    <div class="tabla-toolbar-izq">
                        <div class="tabla-busqueda">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="input-busqueda-contratistas" placeholder="Buscar por nombre, CUIT o especialidad..." oninput="buscarContratistas(this.value)">
                        </div>
                        <span id="contador-contratistas" class="tabla-contador">0 contratistas</span>
                    </div>
                    <div>
                        <button class="btn-primario" onclick="abrirModalNuevoContratista()" id="btn-nuevo-contratista">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Nuevo Contratista
                        </button>
                    </div>
                </div>

                <div class="tabla-contenedor" style="overflow-x:auto;">
                    <table class="tabla" style="min-width:800px;">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>CUIT</th>
                                <th>Teléfono</th>
                                <th>Especialidad</th>
                                <th>Trabajos</th>
                                <th>Deuda pendiente</th>
                                <th style="width:100px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-contratistas-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- TRABAJOS -->
            <div class="contratistas-seccion" id="seccion-trabajos">
                <div id="alerta-pagos-pendientes"></div>

                <div class="tabla-toolbar">
                    <div class="tabla-toolbar-izq">
                        <div class="tabla-busqueda">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="input-busqueda-trabajos" placeholder="Buscar por contratista, tarea o lote..." oninput="buscarTrabajos(this.value)">
                        </div>
                        <span id="contador-trabajos" class="tabla-contador">0 trabajos</span>
                    </div>
                    <div>
                        <button class="btn-primario" onclick="abrirModalNuevoTrabajo()" id="btn-nuevo-trabajo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Nuevo Trabajo
                        </button>
                    </div>
                </div>

                <div class="tabla-contenedor" style="overflow-x:auto;">
                    <table class="tabla" style="min-width:1000px;">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Contratista</th>
                                <th>Lote</th>
                                <th>Tarea</th>
                                <th>Precio</th>
                                <th>Estado</th>
                                <th>Fecha pago</th>
                                <th style="width:100px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-trabajos-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- CHEQUES -->
            <div class="contratistas-seccion" id="seccion-cheques">
                <div style="max-width:400px;margin-bottom:var(--espacio-lg);">
                    <label class="campo-label">Seleccionar contratista</label>
                    <select id="select-contratista-cheques" class="campo-select" onchange="cargarChequesPorContratista(this.value)">
                        <option value="">— Seleccioná un contratista —</option>
                    </select>
                </div>
                <div id="cheques-contratista-resultado"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/contratistas.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout('Contratistas', 'Gestión de contratistas externos y sus trabajos');
            if (!usuario) return;
            if (usuario.rol === 'empleado') {
                document.getElementById('btn-nuevo-contratista')?.style.setProperty('display', 'none');
                document.getElementById('btn-nuevo-trabajo')?.style.setProperty('display', 'none');
            }
            await cargarContratistas();
        }
        iniciar();
    </script>

</body>
</html>
