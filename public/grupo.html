<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo de arrendadores — ERP Agrícola Quintana</title>

    <!-- Fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tablas.css">
    <link rel="stylesheet" href="/css/formularios.css">
    <link rel="stylesheet" href="/css/ficha-arrendador.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="pantalla-carga" class="cargando-pagina">
        <div class="spinner spinner-grande"></div>
        <p>Cargando grupo...</p>
    </div>

    <div id="contenido-principal" class="contenido-principal" style="display: none;">

        <div class="pagina-contenido">

            <!-- Barra superior: Volver a la izquierda, acciones a la derecha. -->
            <!-- Los contenedores con display:contents hacen que los botones inyectados desde -->
            <!-- grupo.js sean hermanos directos del flex (no se forma un sub-flex que rompa el layout) -->
            <div class="ficha-barra-superior no-imprimir" style="flex-wrap: wrap;">
                <a class="btn-secundario" href="/arrendadores.html" style="white-space:nowrap;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Volver
                </a>
                <div style="flex: 1 1 0; min-width: var(--espacio-md);"></div>
                <span id="barra-acciones-grupo" style="display: contents;"></span>
                <button class="btn-secundario" onclick="window.print()" title="Imprimir o guardar como PDF" style="white-space:nowrap;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Imprimir
                </button>
                <span id="barra-acciones-grupo-destructivas" style="display: contents;"></span>
            </div>

            <div id="grupo-contenido">
                <!-- Se llena dinámicamente desde grupo.js -->
            </div>

        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts en orden -->
    <script src="/js/config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/arrendadores.js"></script>
    <script src="/js/grupo.js"></script>

    <script>
        async function iniciar() {
            const usuario = await crearLayout(
                'Grupo de arrendadores',
                'Personas que comparten contratos y suman quintales en conjunto',
                ''
            );
            if (!usuario) return;

            const params = new URLSearchParams(window.location.search);
            const idsParam = params.get('ids');
            if (!idsParam) {
                document.getElementById('grupo-contenido').innerHTML =
                    '<div class="vacio"><p>Falta el parámetro <code>ids</code> en la URL.</p></div>';
                return;
            }
            const ids = idsParam.split(',').map(s => s.trim()).filter(Boolean);
            await cargarFichaGrupo(ids, usuario);
        }
        iniciar();
    </script>

</body>
</html>
